name: SZPERACZ OLX — Weekly Report

on:
  schedule:
    # Poniedziałek: 7:30 UTC = 8:30 CET (zima) / 9:30 CEST (lato)
    - cron: '30 7 * * 1'
  workflow_dispatch:
    # Ręczne uruchomienie

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send weekly email report
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python email_report.py
