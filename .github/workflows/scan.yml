name: SZPERACZ OLX - Daily Scan

on:
  schedule:
    # Cron: 6:00 UTC (z uwzględnieniem opóźnień GitHub Actions ~90-150min)
    # Faktyczne wykonanie: ~8:00-9:30 UTC = ~9:00-10:30 CET (zimą) / 10:00-11:30 CEST (latem)
    # UWAGA: GitHub Actions ma losowe opóźnienia 1.5-2.5h dla scheduled workflows
    # Failsafe workflow (11:00 UTC) sprawdza czy scan się wykonał i triggeruje retry jeśli nie
    - cron: '0 6 * * *'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual scan'
        required: false
        default: 'Manual scan from dashboard'

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run OLX scan
        run: python scraper.py

      - name: Commit and push data
        run: |
          git config user.name "SZPERACZ Bot"
          git config user.email "szperacz-bot@users.noreply.github.com"
          git add data/ docs/api/
          git diff --cached --quiet || git commit -m "🔍 Scan: $(date '+%Y-%m-%d %H:%M') UTC"
          git push
