name: SZPERACZ OLX - Daily Scan

on:
  schedule:
    # 9:00 Polish time (CET/CEST aware)
    # Winter (CET): 8:00 UTC = 9:00 PL
    # Summer (CEST): 8:00 UTC = 10:00 PL
    - cron: '0 8 * * *'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual scan'
        required: false
        default: 'Manual scan from dashboard'

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run OLX scan
        run: python scraper.py

      - name: Commit and push data
        run: |
          git config user.name "SZPERACZ Bot"
          git config user.email "szperacz-bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "🔍 Scan: $(date '+%Y-%m-%d %H:%M') UTC"
          git push

      - name: Keep workflow alive
        run: |
          mkdir -p .github/workflows
          echo "Last scan: $(date)" >> .github/workflows/.keep-alive
          git add .github/workflows/.keep-alive
          git diff --cached --quiet || git commit -m "⏰ Keep-alive: $(date '+%Y-%m-%d')"
          git push || true
