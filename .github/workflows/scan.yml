name: SZPERACZ OLX - Daily Scan

on:
  schedule:
    # 9:00 czasu polskiego przez cały rok
    # ZIMĄ (CET, UTC+1): 8:00 UTC = 9:00 PL ← obecnie aktywne
    # LATEM (CEST, UTC+2): zmień na '0 7 * * *' = 9:00 PL
    # Zmiana czasu: ostatnia niedziela marca (~31.03) i października (~26.10)
    - cron: '0 8 * * *'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual scan'
        required: false
        default: 'Manual scan from dashboard'

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run OLX scan
        run: python scraper.py

      - name: Commit and push data
        run: |
          git config user.name "SZPERACZ Bot"
          git config user.email "szperacz-bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "🔍 Scan: $(date '+%Y-%m-%d %H:%M') UTC"
          git push
