name: SZPERACZ OLX - Daily Scan

on:
  schedule:
    # 7:00 UTC = 8:00 CET (zima) / 9:00 CEST (lato)
    # UWAGA: GitHub Actions może mieć opóźnienia dla scheduled workflows
    # Failsafe workflow (11:00 UTC) sprawdza czy scan się wykonał
    - cron: '0 7 * * *'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual scan'
        required: false
        default: 'Manual scan from dashboard'

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run OLX scan
        run: python scraper.py

      - name: Commit and push data
        run: |
          git config user.name "SZPERACZ Bot"
          git config user.email "szperacz-bot@users.noreply.github.com"
          git add data/ docs/api/
          git diff --cached --quiet || git commit -m "🔍 Scan: $(date '+%Y-%m-%d %H:%M') UTC"
          git push
